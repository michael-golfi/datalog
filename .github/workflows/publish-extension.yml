name: Package VS Code Extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional extension version for the VSIX
        required: false
        type: string
      publish:
        description: Publish to marketplaces after packaging
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - packages/vscode-extension/**

permissions:
  contents: read

jobs:
  package-extension:
    runs-on: ubuntu-latest
    env:
      PACKAGE_VERSION: ${{ github.event.inputs.version || github.event.client_payload.version || '' }}
      VSIX_PATH: ${{ github.workspace }}/artifacts/datalog-language-support.vsix

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build and stage VS Code extension package
        run: yarn workspace @datalog/vscode-extension package

      - name: Create artifact directory
        run: mkdir -p artifacts

      - name: Package VSIX from staged extension
        working-directory: packages/vscode-extension/build/package-stage
        shell: bash
        run: |
          vsce_version_args=()
          if [ -n "$PACKAGE_VERSION" ]; then
            vsce_version_args+=("$PACKAGE_VERSION")
          fi

          "$GITHUB_WORKSPACE/node_modules/.bin/vsce" package "${vsce_version_args[@]}" --no-dependencies --allow-missing-repository --out "$VSIX_PATH"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: datalog-language-support-vsix
          path: ${{ env.VSIX_PATH }}
          if-no-files-found: error

      - name: Publish to VS Code Marketplace
        if: ${{ github.event.inputs.publish == 'true' }}
        working-directory: packages/vscode-extension/build/package-stage
        run: |
          "$GITHUB_WORKSPACE/node_modules/.bin/vsce" publish --no-dependencies --allow-missing-repository --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        if: ${{ github.event.inputs.publish == 'true' }}
        working-directory: packages/vscode-extension/build/package-stage
        run: |
          "$GITHUB_WORKSPACE/node_modules/.bin/ovsx" publish --no-dependencies --allow-missing-repository --pat "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
