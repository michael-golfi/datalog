name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn build

      - name: Version packages
        run: yarn version-packages

      - name: Commit version updates
        run: |
          if git diff --quiet; then
            exit 0
          fi

          git add .
          git -c user.name="${GITHUB_ACTOR}" -c user.email="${GITHUB_ACTOR}@users.noreply.github.com" commit -m "chore: version packages"

      - name: Publish packages to npm
        run: yarn build && changeset publish --provenance

      - name: Generate release tags
        run: yarn changeset tag

      - name: Push release commit and tags
        run: git push --follow-tags origin HEAD:${GITHUB_REF_NAME}

      - name: Create GitHub release
        run: |
          tag="$(git tag --sort=-version:refname | head -n 1)"

          if [ -z "$tag" ]; then
            echo "No release tag was created."
            exit 1
          fi

          gh release create "$tag" --generate-notes
